author: "radarseas"
delete-after: True
changes:
  - rscadd: "added zombie antag huds"
  - rscadd: "a small short-lived horrifying transformation sequence when people turn into deadites from zombification infection or from rotting too long"
  - qol: "zombies are automatically put into combat mode once they finish their transformation so you can deal with the immedate attempts to grapple pin/attack you"
  - balance: "diagnosis spell now shows completely turned deadites (if you couldn't tell already) and how to deal with that"
  - balance: "zombies can no longer table slam/throw"
  - balance: "zombies can now re-attach limbs and are able to do so on themselves without the need of surgery skill"
  - balance: "zombies can now sprint and have stamina"
  - balance: "zombies can no longer climb (excluding basic rock surfaces)"
  - balance: "zombies can no longer use woodwalker/puglist/fall immunity in any shape or form"
  - balance: "zombies have their stats pre-set now, excluding fortune"
  - balance: "zombies no longer lose their masks/helmets on turning"
  - balance: "zombies can now passively heal off injuries/wounds unless they're sundered/set on fire. restrain them or finish them because they won't stay down if you don't."
  - balance: "being infected by a zombie/deadite animal now only shows messages every 40 seconds but also makes your ambience music creepy, its UI icon is fixed and shows up now."
  - balance: "zombies can be examined through any and all gear regardless"
  - balance: "zombies fall over when landing from a leap"
  - balance: "zombies can no longer use unintended special intents, doing so will usually give you a comedic message instead"
  - balance: "deadites can tell concious/living targets that lack trait_zombie_immune, constructs/necromancers/rituos users/sun elves/reverents/rotmen and other such will not render this message to zombies, this DOES NOT MEAN THEY WILL NOT MAUL YOU."
  - qol: "zombies get HUD Icons to tell their own, since they basically can be examined by everyone though all of their gear."
  - bugfix: "zombies can no longer use specials/fients/baits/ripostes"