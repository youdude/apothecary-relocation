author: "radarseas"
delete-after: True
changes:
  - rscadd: "divine/unholy blasts have a flavor message for EVERY PATRON."
  - balance: "redone most divine blasts, Malum no longer skyrockets you into burncrit, Necra smites all deathless abominations, Zizo doesn't sunder undead but sunders the living, werewolves and Necrans."
  - balance: "Astratan Divine blast does (1) Extra firestack on Matthiosians. ANCIENT ENEMY I DO NOT FEAR YOU."
  - balance: "the rest of the Four that aren't Zizo still smite the unlyving like they currently do."
  - balance: "you no longer yell incantations so loud people can hear you off-screen as an ascendant casting unholy blast but instead say them normally like most clerics."
  - balance: "non-Astrata/Matthios divine blasts do Divine firestacks instead of regular."
  - balance: "less damage to undead (they usually worship Zizo anyway) unless they're nearby to Necran crosses in which case they get hit with the full damage amount."
  - balance: "divine blasts are fixed and can now set silverweak people on fire with divine flames instead of sunderflames that put you into paincrit."
  - balance: "divine blasts do divine firestacks instead of sundering because re-enabling pain on a ranged miracle that can do this through armor is wackshit insane."
  - bugfix: "fixed divine bolts not setting silverweak on fire as intended but also giving you invisible sunderstacks that would nuke you instantly."
  - image: "added unholy blast sprites"